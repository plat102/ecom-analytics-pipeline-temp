version: 2

macros:
  - name: scd2_calculate_is_current
    description: |
      Calculate is_current flag for SCD Type 2 versioning.

      **Logic:**
      - Use LEAD() to check if there's a next version
      - If LEAD() IS NULL: This is the latest version -> is_current = TRUE
      - If LEAD() IS NOT NULL: There's a newer version -> is_current = FALSE

      **Example:**
      ```
      customer_natural_key | first_seen_with_this_email | LEAD() result | is_current
      ---------------------|----------------------------|---------------|------------
      user123              | 2019-10-01                 | 2019-10-15    | FALSE (has next version)
      user123              | 2019-10-15                 | NULL          | TRUE (latest version)
      ```
    arguments:
      - name: timestamp_column
        type: string
        description: Column containing version start timestamp
      - name: partition_by_column
        type: string
        description: Natural key to partition versions (e.g., customer_natural_key)

  - name: scd2_calculate_valid_to
    description: |
      Calculate valid_to timestamp for SCD Type 2 temporal versioning.

      **Logic:**
      - Use LEAD() to peek at the next version's timestamp
      - If next version exists: valid_to = start timestamp of next version
      - If no next version (latest version): valid_to = 9999-12-31 00:00:00 (scd_end_date)
      - Uses TIMESTAMP precision to handle intra-day version changes

      **Example:**
      ```
      customer_natural_key | first_seen_with_this_email     | valid_to (calculated)
      ---------------------|--------------------------------|---------------------
      user123              | 2019-10-01 08:30:00            | 2019-10-15 14:22:00 (next version starts)
      user123              | 2019-10-15 14:22:00            | 9999-12-31 00:00:00 (no next version)
      ```
    arguments:
      - name: timestamp_column
        type: string
        description: Column containing version start timestamp
      - name: partition_by_column
        type: string
        description: Natural key to partition versions (e.g., customer_natural_key)
      - name: fallback_date
        type: string
        description: Optional custom end date instead of 9999-12-31

  - name: scd2_row_hash
    description: |
      Generate MD5 hash for SCD Type 2 change detection.

      **Logic:**
      - Concatenate all tracked attributes (with NULL handling via COALESCE)
      - Generate MD5 hash of the concatenated string
      - Used to detect when tracked attributes change between runs

      **Example:**
      ```sql
      -- Single attribute:
      scd2_row_hash(['email_address'])
      -- Result: MD5(COALESCE(email_address, ''))

      -- Multiple attributes (e.g., for dim_product):
      scd2_row_hash(['price', 'currency_code', 'product_name'])
      -- Result: MD5(CONCAT(COALESCE(price, ''), COALESCE(currency_code, ''), COALESCE(product_name, '')))
      ```
    arguments:
      - name: columns
        type: list
        description: List of column names to include in the hash (e.g., ['email_address'] or ['price', 'currency_code'])

  - name: scd_end_date
    description: |
      Return the standard end timestamp for current SCD Type 2 records.

      **Logic:**
      - Returns `9999-12-31 00:00:00` as the valid_to timestamp for current versions
      - This is a common convention in data warehousing to represent "infinity" or "current"
      - Uses TIMESTAMP precision (not DATE) to match valid_from precision

      **Usage:**
      ```sql
      -- For current versions:
      valid_to = scd_end_date()  -- Results in: TIMESTAMP('9999-12-31 00:00:00')

      -- Used in both incremental and initial load:
      SELECT
        customer_key,
        email_address,
        valid_from,
        scd_end_date() AS valid_to,  -- Current version
        TRUE AS is_current
      FROM new_customers
      ```
