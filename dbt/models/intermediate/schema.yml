version: 2

models:
  - name: int_events_checkout_success
    description: |
      Checkout events with device parsing (EVENT GRAIN).
      Grain: 1 row = 1 checkout event (~200K rows).
      Design: Filter-first - filters to checkout_success events BEFORE parsing device
      (not after parsing all events). Implements reduction in parsing operations.

    columns:
      - name: event_id
        description: Unique event identifier (primary key at event grain)
        tests:
          - unique
          - not_null

      - name: event_timestamp
        description: Event timestamp
        tests:
          - not_null

      - name: event_date
        description: Event date
        tests:
          - not_null

      - name: event_type
        description: Type of event (always checkout_success)
        tests:
          - not_null
          - accepted_values:
              values: ['checkout_success']

      - name: store_id
        description: Store identifier
        tests:
          - not_null

      - name: order_id
        description: Order identifier (business key)
        tests:
          - not_null

      - name: cart_products
        description: Array of products in cart (required for downstream UNNEST)
        tests:
          - not_null

      - name: user_agent
        description: Browser user agent string (used for device parsing)
        tests:
          - not_null

      - name: device_category
        description: Parsed device category (Mobile, Tablet, Desktop)
        tests:
          - not_null
          - accepted_values:
              values: ['Mobile', 'Tablet', 'Desktop']

      - name: browser
        description: Parsed browser name (Chrome, Safari, Firefox, Edge, Other)
        tests:
          - not_null
          - accepted_values:
              values: ['Chrome', 'Safari', 'Firefox', 'Edge', 'Other']

      - name: os
        description: Parsed operating system (Windows, macOS, Android, iOS, Other)
        tests:
          - not_null
          - accepted_values:
              values: ['Windows', 'macOS', 'Android', 'iOS', 'Other']

  - name: int_events_cart_items
    description: |
      Line items from checkout events (LINE ITEM GRAIN).
      Grain: 1 row = 1 product in 1 checkout event.

      Design: Inherits device fields from int_events_checkout_success (event grain),
      only UNNESTs cart_products.

      Init: Source: ~200K checkout events; Output: ~726K line items (avg 3.6 items per order).
    columns:
      - name: event_id
        description: Event identifier (not unique at line item grain)
        tests:
          - not_null

      - name: order_id
        description: Order identifier (not unique at line item grain)
        tests:
          - not_null

      - name: product_id
        description: Product identifier for this line item
        tests:
          - not_null

      - name: quantity
        description: Quantity of product in this line item
        tests:
          - not_null

      - name: unit_price
        description: Unit price for this product

      - name: currency_code
        description: Currency code for pricing
        tests:
          - not_null

      - name: customer_natural_key
        description: Customer natural key (user_id_db or device_id)
        tests:
          - not_null

      - name: device_category
        description: Device category (inherited from event grain upstream)
        tests:
          - not_null
          - accepted_values:
              values: ['Mobile', 'Tablet', 'Desktop']

      - name: browser
        description: Browser name (inherited from event grain upstream)
        tests:
          - not_null
          - accepted_values:
              values: ['Chrome', 'Safari', 'Firefox', 'Edge', 'Other']

      - name: os
        description: Operating system (inherited from event grain upstream)
        tests:
          - not_null
          - accepted_values:
              values: ['Windows', 'macOS', 'Android', 'iOS', 'Other']

  - name: int_sales_with_customer
    description: |
      Sales with resolved SCD Type 2 customer join and order_date.
      Resolves expensive dim_customer SCD Type 2 join ONCE and adds order_date for partitioning.
      Serves as base for all mart models.
      Grain: 1 row = 1 line item (same as fact_sales_order_line)
    config:
      materialized: table
      partition_by:
        field: order_date
        data_type: date
        granularity: day
      cluster_by: ['store_id', 'customer_natural_key']
    columns:
      - name: sales_line_key
        description: Surrogate key for sales line item
        tests:
          - unique
          - not_null

      - name: order_id
        description: Order identifier
        tests:
          - not_null

      - name: store_id
        description: Store identifier
        tests:
          - not_null

      - name: date_key
        description: Date key (YYYYMMDD format)
        tests:
          - not_null
          - relationships:
              to: ref('dim_date')
              field: date_key

      - name: order_date
        description: Order date (added for partitioning)
        tests:
          - not_null

      - name: customer_key
        description: Customer surrogate key
        tests:
          - not_null
          - relationships:
              to: ref('dim_customer')
              field: customer_key

      - name: customer_natural_key
        description: Customer natural key

      - name: email_address
        description: Customer email address (current version)

      - name: is_guest
        description: Guest customer flag

      - name: product_key
        description: Product surrogate key
        tests:
          - not_null
          - relationships:
              to: ref('dim_product')
              field: product_key

      - name: line_total_usd
        description: Line total converted to USD
