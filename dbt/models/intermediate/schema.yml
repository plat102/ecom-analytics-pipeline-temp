version: 2

models:
  - name: int_events_checkout_success
    description: |
      Checkout events with device parsing (EVENT GRAIN).
      Grain: 1 row = 1 checkout event (~200K rows).

      Consumers: dim_device, int_events_cart_items

      Design: Filter-first approach - filters to checkout_success events BEFORE parsing device
      (not after parsing all 40.7M events). Implements 99.5% reduction in parsing operations.

      This model combines the logic from the old int_checkout_events (filter) and
      int_checkout_events_with_device (parse) into a single, more efficient model.
    columns:
      - name: event_id
        description: Unique event identifier (primary key at event grain)
        tests:
          - unique
          - not_null

      - name: event_timestamp
        description: Event timestamp
        tests:
          - not_null

      - name: event_date
        description: Event date
        tests:
          - not_null

      - name: event_type
        description: Type of event (always checkout_success)
        tests:
          - not_null
          - accepted_values:
              values: ['checkout_success']

      - name: store_id
        description: Store identifier
        tests:
          - not_null

      - name: order_id
        description: Order identifier (business key)
        tests:
          - not_null

      - name: cart_products
        description: Array of products in cart (required for downstream UNNEST)
        tests:
          - not_null

      - name: user_agent
        description: Browser user agent string (used for device parsing)
        tests:
          - not_null

      - name: device_category
        description: Parsed device category (Mobile, Tablet, Desktop)
        tests:
          - not_null
          - accepted_values:
              values: ['Mobile', 'Tablet', 'Desktop']

      - name: browser
        description: Parsed browser name (Chrome, Safari, Firefox, Edge, Other)
        tests:
          - not_null
          - accepted_values:
              values: ['Chrome', 'Safari', 'Firefox', 'Edge', 'Other']

      - name: os
        description: Parsed operating system (Windows, macOS, Android, iOS, Other)
        tests:
          - not_null
          - accepted_values:
              values: ['Windows', 'macOS', 'Android', 'iOS', 'Other']

  - name: int_events_cart_items
    description: |
      Line items from checkout events (LINE ITEM GRAIN).
      Grain: 1 row = 1 product in 1 checkout event (~726K rows).

      Consumers: fact_sales_order_line

      Design: Inherits device fields from int_events_checkout_success (event grain),
      only UNNESTs cart_products. This model focuses on a single responsibility
      (UNNEST only), while device parsing is done upstream at the correct grain.

      Source: ~200K checkout events, Output: ~726K line items (avg 3.6 items per order).
    columns:
      - name: event_id
        description: Event identifier (not unique at line item grain)
        tests:
          - not_null

      - name: order_id
        description: Order identifier (not unique at line item grain)
        tests:
          - not_null

      - name: product_id
        description: Product identifier for this line item
        tests:
          - not_null

      - name: quantity
        description: Quantity of product in this line item
        tests:
          - not_null

      - name: unit_price
        description: Unit price for this product

      - name: currency_code
        description: Currency code for pricing
        tests:
          - not_null

      - name: customer_natural_key
        description: Customer natural key (user_id_db or device_id)
        tests:
          - not_null

      - name: device_category
        description: Device category (inherited from event grain upstream)
        tests:
          - not_null
          - accepted_values:
              values: ['Mobile', 'Tablet', 'Desktop']

      - name: browser
        description: Browser name (inherited from event grain upstream)
        tests:
          - not_null
          - accepted_values:
              values: ['Chrome', 'Safari', 'Firefox', 'Edge', 'Other']

      - name: os
        description: Operating system (inherited from event grain upstream)
        tests:
          - not_null
          - accepted_values:
              values: ['Windows', 'macOS', 'Android', 'iOS', 'Other']
